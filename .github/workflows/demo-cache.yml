name: Demo-cache

on:
  workflow_dispatch:
    
jobs:
  job-1:
    runs-on: ubuntu-latest
    steps:
      - name: attempt to read cache
        id: demo-cache
        uses: actions/cache@v4
        with:
          path: demo-cache
          key: my-demo-code

      - name: add something to the cache
        if: steps.demo-cache.outputs.cache-hit!='true'
        run: |
          echo "Cache is missing, generating content"
          mkdir -p myDir
          date>>myDir/myFile.txt
      - name: attempt to read cache again
        if: steps.demo-cache.outputs.cache-hit!='true'
        uses: actions/cache@v4
        with:
          path: demo-cache
          key: my-demo-code

      - name: Verify cache
        run: |
          echo "Cache is hit? -> ${{steps.demo-cache.outputs.cache-hit}}"
          cat myDir>>myFile.txt